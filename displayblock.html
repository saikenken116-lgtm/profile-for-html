<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile card</title>
    <style>
        .box {
            width: 250px;
            height: 250px;;
            border: none;
            margin: 20px auto;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            background: linear-gradient(to right ,#c390e1, #ee3eb4);
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-image: url("https://m.media-amazon.com/images/I/81s4wlPWJAL._AC_UF1000,1000_QL80_DpWeblab_.jpg");
            background-size: cover;
            background-position:center;
            padding: 10px;
            margin: 0 auto 20px;
        }
        .button{
            color: rgba(207, 0, 0, 0.8);
            background: none;
            border-radius: 80px;
            border: none;
            padding: 5px 5px;

        }



    </style>

</head>
<body>
    <hr>
<div class="box">
    <div class="title">
        PROFILE
    </div>
    <br>


    <div class="avatar">

    </div>


    <div class="name">
        Dhruv Chaturvedi
    </div>
<br>

    <div class="role">
        MERN DEVELOPER
    </div>
    <hr>
    <div class="button">
        <button>Follow</button>
</div>
    
</body>
</html>
